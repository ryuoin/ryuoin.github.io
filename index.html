<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오늘의 메이저 타로</title>
    <!-- 폰트 로드: Cinzel(영문/숫자, 신비로운 느낌), Noto Sans KR(한글 본문) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;700&family=Hahmlet:wght@400;700&family=Noto+Sans+KR:wght@300;400;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- 배경을 위한 파티클/안개 효과 요소 -->
    <div class="stars"></div>
    <div class="twinkling"></div>

    <header class="app-header">
        <h1>당신의 이번주 운세</h1>
        <p>당신의 운명을 이끌어줄 3장의 카드를 선택하세요.</p>
        <div class="status-bar">
            <span>선택한 카드: <span id="select-count">0</span> / 3</span>
        </div>
    </header>

    <main class="app-main">
        <!-- 22개의 카드가 렌더링될 컨테이너 -->
        <div id="card-container" class="card-container"></div>
    </main>

    <!-- 결과 모달 -->
    <div id="result-modal" class="modal-overlay">
        <div class="modal-content glass-panel">
            <h2 class="modal-title">당신의 이번주 운세</h2>
            
            <div class="reading-container">
                <!-- 카드 3장 가로 정렬 -->
                <div class="cards-display">
                    <div class="reading-slot-mini">
                        <div class="slot-title-mini">과거 <span>(원인)</span></div>
                        <div id="res-card-past" class="res-card-wrapper"></div>
                    </div>
                    <div class="reading-slot-mini">
                        <div class="slot-title-mini">현재 <span>(상황)</span></div>
                        <div id="res-card-present" class="res-card-wrapper"></div>
                    </div>
                    <div class="reading-slot-mini">
                        <div class="slot-title-mini">미래 <span>(조언)</span></div>
                        <div id="res-card-future" class="res-card-wrapper"></div>
                    </div>
                </div>

                <!-- 하나로 묶여진 해석 텍스트 -->
                <div class="combined-desc-box">
                    <div id="res-desc-combined" class="res-desc combined-desc"></div>
                </div>
            </div>

            <button id="btn-restart" class="btn-primary">다시 뽑기</button>
        </div>
    </div>

    <!-- 스크립트 로드 -->
    <script src="js/tarotData.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
